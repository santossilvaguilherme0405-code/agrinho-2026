<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Sustentabilidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <h1 class="logo">AGRINHO<span>2026</span></h1>
        </nav>
    </header>

    <main>
        <section id="inicio" class="hero">
            <h2>Agro forte, futuro sustentável</h2>
            <p>Equilíbrio entre produção e meio ambiente</p>
        </section>

        <section id="simulador">
            <h3>Simulador de Impacto Ambiental</h3>
            <div class="controle">
                <label>Produção: <span id="val_producao">50</span>%</label>
                <input type="range" id="nivel_producao" min="0" max="100" value="50">
            </div>
            <div id="resultado-status" class="status-box">
                Mova o controle para ver o equilíbrio.
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Projeto Agrinho - Autoral</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
